name: Haspataal CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_ORG: haspataal

jobs:
  # ================================================================
  # JOB 1: Lint, Type-check, and Unit Tests
  # ================================================================
  lint-and-test:
    name: 🔍 Lint & TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: TypeScript check (patient portal)
        run: npx tsc --noEmit

      - name: Install doctor-portal deps
        run: npm ci
        working-directory: ./doctor-portal

      - name: TypeScript check (doctor-portal)
        run: npx tsc --noEmit
        working-directory: ./doctor-portal

      - name: Install hospital-hms deps
        run: npm ci
        working-directory: ./hospital-hms

      - name: TypeScript check (hospital-hms)
        run: npx tsc --noEmit
        working-directory: ./hospital-hms

      - name: Run Backend Health Check
        run: node scripts/backend-health-check.js
        env:
          # Add these in: GitHub repo → Settings → Secrets and Variables → Actions
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ================================================================
  # JOB 2: Build Docker Images
  # ================================================================
  build-images:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push patient-portal
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/patient-portal:latest

      - name: Build & Push doctor-portal
        uses: docker/build-push-action@v5
        with:
          context: ./doctor-portal
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/doctor-portal:latest

      - name: Build & Push hospital-hms
        uses: docker/build-push-action@v5
        with:
          context: ./hospital-hms
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/hospital-hms:latest

      - name: Build & Push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/api-gateway:latest

      - name: Build & Push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/auth-service:latest

  # ================================================================
  # JOB 3: Deploy to Production (SSH + Docker Compose)
  # ================================================================
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build-images
    # Only deploy on direct push to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # NOTE: To enable GitHub Environment protection rules (manual approval gate), create an
    # environment in: Repo → Settings → Environments → New → name it "prod", then uncomment:
    # environment: prod
    # Required secrets (add in Repo → Settings → Secrets → Actions):
    #   PROD_SSH_HOST, PROD_SSH_USER, PROD_SSH_PRIVATE_KEY, PROD_ENV
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/haspataal
            git pull origin main
            printf '%s' "${{ secrets.PROD_ENV }}" > .env
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Haspataal deployed successfully at $(date)"
