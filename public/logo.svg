<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 640" fill="none">
  <defs>
    <!-- Main Blue Gradient (Pin Body) -->
    <linearGradient id="pinGrad" x1="256" y1="0" x2="256" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="35%" stop-color="#1E56A0"/>
      <stop offset="100%" stop-color="#0D2B55"/>
    </linearGradient>

    <!-- Left Highlight Gradient -->
    <linearGradient id="highlightGrad" x1="100" y1="80" x2="350" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1E3A6E" stop-opacity="0"/>
    </linearGradient>

    <!-- Shield Gradient -->
    <linearGradient id="shieldGrad" x1="256" y1="120" x2="256" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>

    <!-- Inner Shield Gradient -->
    <linearGradient id="innerShieldGrad" x1="256" y1="150" x2="256" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E56A0"/>
      <stop offset="100%" stop-color="#0D2B55"/>
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="shadow" x="-20%" y="-5%" width="140%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dy="8"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for the whole logo -->
    <filter id="dropShadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0D2B55" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Ground Shadow (Ellipse) -->
  <ellipse cx="256" cy="580" rx="100" ry="18" fill="#0D2B55" opacity="0.12"/>

  <!-- === LOCATION PIN BODY === -->
  <g filter="url(#dropShadow)">
    <!-- Pin Shape: circle top + pointed bottom -->
    <path d="
      M256 540
      C240 490, 80 380, 80 220
      C80 122.68, 158.68 44, 256 44
      C353.32 44, 432 122.68, 432 220
      C432 380, 272 490, 256 540Z
    " fill="url(#pinGrad)"/>

    <!-- Left Highlight Crescent -->
    <path d="
      M256 540
      C240 490, 80 380, 80 220
      C80 122.68, 158.68 44, 256 44
      C200 44, 130 122.68, 130 220
      C130 360, 248 482, 256 540Z
    " fill="url(#highlightGrad)"/>

    <!-- Thin bright rim at top -->
    <path d="
      M140 220
      C140 145, 195 72, 256 72
      C317 72, 372 145, 372 220
    " fill="none" stroke="#60A5FA" stroke-width="2" opacity="0.4"/>

    <!-- === SHIELD (Outer White/Light Blue) === -->
    <path d="
      M256 130
      L340 165
      C345 167, 348 172, 348 178
      L348 260
      C348 300, 310 340, 256 365
      C202 340, 164 300, 164 260
      L164 178
      C164 172, 167 167, 172 165
      Z
    " fill="url(#shieldGrad)" opacity="0.95"/>

    <!-- Shield Inner (Dark Blue Fill) -->
    <path d="
      M256 152
      L324 180
      C328 182, 330 186, 330 190
      L330 255
      C330 288, 300 320, 256 340
      C212 320, 182 288, 182 255
      L182 190
      C182 186, 184 182, 188 180
      Z
    " fill="url(#innerShieldGrad)"/>

    <!-- === MEDICAL CROSS + H LETTER === -->
    <!-- Medical Cross Shape (white outline) -->
    <path d="
      M234 200 L278 200 L278 215 L300 215 L300 260 L278 260 L278 295 L234 295 L234 260 L212 260 L212 215 L234 215 Z
    " fill="none" stroke="white" stroke-width="3" opacity="0.35"/>

    <!-- Letter H -->
    <g fill="white" font-family="Arial, Helvetica, sans-serif" font-weight="900">
      <!-- Left vertical bar -->
      <rect x="230" y="218" width="16" height="62" rx="2"/>
      <!-- Right vertical bar -->
      <rect x="266" y="218" width="16" height="62" rx="2"/>
      <!-- Horizontal connector -->
      <rect x="230" y="240" width="52" height="16" rx="2"/>
    </g>
  </g>
</svg>
