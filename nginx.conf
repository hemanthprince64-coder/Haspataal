events {
    worker_connections 1024;
}

http {
    # Time limits
    proxy_read_timeout 60;
    proxy_connect_timeout 60;
    proxy_send_timeout 60;

    # Upstreams: Each service as isolated Docker container
    upstream patient_portal     { server patient-portal:3000; }
    upstream doctor_portal      { server doctor-portal:3001; }
    upstream hospital_hms       { server hospital-hms:3002; }
    upstream admin_panel        { server admin-panel:3003; }
    upstream api_gateway        { server api-gateway:4002; }
    upstream auth_service       { server auth-service:4001; }

    # ---- haspataal.com (Patient Portal) ----
    server {
        listen 80;
        server_name haspataal.com www.haspataal.com;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl http2;
        server_name haspataal.com www.haspataal.com;

        ssl_certificate /etc/letsencrypt/live/haspataal.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/haspataal.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://patient_portal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # ---- doctor.haspataal.com ----
    server {
        listen 443 ssl http2;
        server_name doctor.haspataal.com;
        ssl_certificate /etc/letsencrypt/live/haspataal.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/haspataal.com/privkey.pem;
        location / {
            proxy_pass http://doctor_portal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ---- hospital.haspataal.com ----
    server {
        listen 443 ssl http2;
        server_name hospital.haspataal.com;
        ssl_certificate /etc/letsencrypt/live/haspataal.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/haspataal.com/privkey.pem;
        location / {
            proxy_pass http://hospital_hms;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ---- admin.haspataal.com ----
    server {
        listen 443 ssl http2;
        server_name admin.haspataal.com;
        ssl_certificate /etc/letsencrypt/live/haspataal.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/haspataal.com/privkey.pem;
        location / {
            proxy_pass http://admin_panel;
            proxy_set_header Host $host;
        }
    }

    # ---- api.haspataal.com ----
    server {
        listen 443 ssl http2;
        server_name api.haspataal.com;
        ssl_certificate /etc/letsencrypt/live/haspataal.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/haspataal.com/privkey.pem;

        # CORS Pre-flight
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        location / {
            if ($request_method = OPTIONS) { return 204; }
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
        }
    }

    # ---- auth.haspataal.com ----
    server {
        listen 443 ssl http2;
        server_name auth.haspataal.com;
        ssl_certificate /etc/letsencrypt/live/haspataal.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/haspataal.com/privkey.pem;
        location / {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
        }
    }
}
